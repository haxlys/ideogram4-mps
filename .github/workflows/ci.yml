name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - codex/mlx-migration

jobs:
  verify:
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: webui/pnpm-lock.yaml

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r server/requirements.txt

      - name: Python compile and runtime guardrails
        run: |
          python -m compileall server ideogram4_mlx.py
          python scripts/check_mlx_runtime_guardrails.py

      - name: Install WebUI dependencies
        working-directory: webui
        run: pnpm install --frozen-lockfile

      - name: Lint WebUI
        working-directory: webui
        run: pnpm lint

      - name: Build WebUI
        working-directory: webui
        run: pnpm build
